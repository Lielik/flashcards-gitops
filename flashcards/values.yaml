# ==========================================================
# Flashcards Umbrella Chart Values
# ==========================================================

namespace: apps

# Global values for MongoDB subchart compatibility ----
global:
  mongodb:
    host: "flashcards-mongodb.apps.svc.cluster.local"
    port: 27017
    database: "flashcards"

# ==========================================================
# Flask API Configuration
# ==========================================================
api:
  enabled: true
  replicaCount: 2
  
  image:
    registry: "473959757606.dkr.ecr.ap-south-1.amazonaws.com"
    repository: "flashcards-app"
    pullPolicy: Always
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  env:
    - name: PORT
      value: "5000"
    - name: DEBUG
      value: "false"
  
  sealedSecret:
    enabled: true
    name: mongo-uri

# ==========================================================
# NGINX Configuration
# ==========================================================
nginx:
  enabled: true
  replicaCount: 2
  
  image:
    registry: "473959757606.dkr.ecr.ap-south-1.amazonaws.com"
    repository: "flashcards-nginx"
    pullPolicy: Always
  
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  
  ingress:
    enabled: true
    className: alb
    annotations: 
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: flashcards.ddns.net
        paths:
          - path: /
            pathType: Prefix
    tls: 
      - hosts:
          - flashcards.ddns.net
        secretName: flashcards-tls

# ==========================================================
# MongoDB Configuration
# ==========================================================
mongodb:
  enabled: true
  
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  persistence:
    enabled: true
    storageClass: "gp2"
    size: 1Gi
    accessMode: ReadWriteOnce
  
  auth:
    enabled: true
    rootUser: root
    usernames: ["flashcards-user"]
    databases: ["flashcards"]
    existingSecret: mongodb-auth
    
  sealedSecret:
    enabled: true
    name: mongo-credentials
  
  livenessProbe:
    exec:
      command:
        - mongosh
        - --eval
        - "db.adminCommand('ping')"
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    exec:
      command:
        - mongosh
        - --eval
        - "db.adminCommand('ping')"
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3