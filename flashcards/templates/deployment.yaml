apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flashcards-app.fullname" . }}
  namespace: {{ .Values.flashcards.namespace | default "apps" }}
  labels:
    {{- include "flashcards-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.flashcards.replicaCount }}
  selector:
    matchLabels:
      {{- include "flashcards-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "flashcards-app.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: flashcards-api
        image: "{{ .Values.flashcards.image.registry }}/{{ .Values.flashcards.image.repository }}:{{ .Values.flashcards.image.tag }}"
        imagePullPolicy: {{ .Values.flashcards.image.pullPolicy }}
        
        ports:
        - name: http
          containerPort: {{ .Values.flashcards.service.targetPort }}
          protocol: TCP
        
        # Environment variables
        env:
        {{- range .Values.flashcards.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        
        # MongoDB URI from sealed secret
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: {{ .Values.flashcards.sealedSecret.name }}
              key: uri
        
        # Liveness probe - checks if container is alive
        {{- if .Values.flashcards.livenessProbe }}
        livenessProbe:
          {{- toYaml .Values.flashcards.livenessProbe | nindent 10 }}
        {{- end }}
        
        # Readiness probe - checks if container is ready to serve traffic
        {{- if .Values.flashcards.readinessProbe }}
        readinessProbe:
          {{- toYaml .Values.flashcards.readinessProbe | nindent 10 }}
        {{- end }}
        
        # Resource limits
        {{- if .Values.flashcards.resources }}
        resources:
          {{- toYaml .Values.flashcards.resources | nindent 10 }}
        {{- end }}

---
# Helper template definitions
{{- define "flashcards-app.fullname" -}}
{{- .Chart.Name }}-{{ .Release.Name }}
{{- end }}

{{- define "flashcards-app.labels" -}}
app.kubernetes.io/name: {{ .Chart.Name }}
app.kubernetes.io/instance: {{ .Release.Name }}
app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
app.kubernetes.io/managed-by: {{ .Release.Service }}
{{- end }}

{{- define "flashcards-app.selectorLabels" -}}
app.kubernetes.io/name: {{ .Chart.Name }}
app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}