apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flashcards.fullname" . }}-nginx
  namespace: {{ .Values.namespace | default "apps" }}
  labels:
    {{- include "flashcards.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  replicas: {{ .Values.nginx.replicaCount }}
  selector:
    matchLabels:
      {{- include "flashcards.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nginx
  template:
    metadata:
      labels:
        {{- include "flashcards.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nginx
      annotations:
        # Force pod restart when ConfigMap changes
        checksum/config: {{ include (print $.Template.BasePath "/nginx-configmap.yaml") . | sha256sum }}
    spec:
      containers:
      - name: nginx
        image: "{{ .Values.nginx.image.registry }}/{{ .Values.nginx.image.repository }}:{{ .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
        
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        
        # Mount the ConfigMap as a volume
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
        
        # Health probes
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Resource limits
        resources:
          {{- toYaml .Values.nginx.resources | nindent 10 }}
      
      # Define the ConfigMap volume
      volumes:
      - name: nginx-config
        configMap:
          name: {{ include "flashcards.fullname" . }}-nginx-config
          items:
          - key: nginx.conf
            path: nginx.conf

---
{{- define "flashcards.fullname" -}}
{{- .Chart.Name }}-{{ .Release.Name }}
{{- end }}

{{- define "flashcards.labels" -}}
app.kubernetes.io/name: {{ .Chart.Name }}
app.kubernetes.io/instance: {{ .Release.Name }}
app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
app.kubernetes.io/managed-by: {{ .Release.Service }}
{{- end }}

{{- define "flashcards.selectorLabels" -}}
app.kubernetes.io/name: {{ .Chart.Name }}
app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}