{{- if and .Values.nginx (and .Values.nginx.ingress .Values.nginx.ingress.enabled) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "flashcards.fullname" . }}
  namespace: {{ .Values.namespace | default "apps" }}
  labels:
    {{- include "flashcards.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.nginx.ingress.annotations }}
    {{- toYaml .Values.nginx.ingress.annotations | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.nginx.ingress.className }}
  ingressClassName: {{ .Values.nginx.ingress.className | quote }}
  {{- end }}

  {{- if .Values.nginx.ingress.tls }}
  tls:
    {{- range .Values.nginx.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      {{- if .secretName }}
      secretName: {{ .secretName }}
      {{- end }}
    {{- end }}
  {{- end }}

  rules:
    {{- range .Values.nginx.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "flashcards.fullname" $ }}-nginx
                port:
                  number: 80
          {{- end }}
    {{- end }}
{{- end }}
