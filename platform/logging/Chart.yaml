apiVersion: v2
name: logging-stack
description: EFK (Elasticsearch, Fluent Bit, Kibana) logging stack
type: application
version: 1.0.0

dependencies:
  - name: elasticsearch
    version: 8.5.1
    repository: https://helm.elastic.co
    condition: elasticsearch.enabled
  
  - name: fluent-bit
    version: 0.54.0
    repository: https://fluent.github.io/helm-charts
    condition: fluent-bit.enabled
  
  - name: kibana
    version: 8.5.1
    repository: https://helm.elastic.co
    condition: kibana.enabled