# The Elasticsearch service endpoint that Kibana connects to for reading/writing data.
elasticsearchHosts: "https://elasticsearch-master:9200" # ES-k8s-service-name:default-ES-port

# Accept self-signed ES cert in the lab
kibanaConfig:
  kibana.yml: |
    elasticsearch.ssl.verificationMode: none

service:
  type: ClusterIP #  Expose Kibana only inside the cluster because we use ingress

resources:
  requests:
    cpu: "200m"
    memory: "768Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: kibana.local
      paths:
        - path: /
          pathType: Prefix