elasticsearch:
  replicas: 3
  minimumMasterNodes: 2

  esJavaOpts: "-Xmx512m -Xms512m"

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

  volumeClaimTemplate:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 10Gi

  esConfig:
    elasticsearch.yml: |
      xpack.security.enabled: false
