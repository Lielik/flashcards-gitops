replicas: 1 # try again
resources: # Resource requests and limits for the pod
  requests:
    cpu: "100m"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "2Gi"

antiAffinity: "soft" # try to spread the pods apart, if you can't put them on the same one the same node, usefull for scale up.

volumeClaimTemplate: # Storage request for the ES data volume
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi