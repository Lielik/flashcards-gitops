fluent-bit:
  enabled: true
  
  # Resource limits for each Fluent Bit pod
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  
  # Configuration
  config:
    
    # What logs to collect
    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          Parser docker
          Tag kube.*
          Mem_Buf_Limit 5MB
          Skip_Long_Lines On
    
    # Parse and enrich logs
    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Kube_URL https://kubernetes.default.svc:443
          Kube_CA_File /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
          Merge_Log On
          K8S-Logging.Parser On
          K8S-Logging.Exclude On
    
    # Where to send logs
    outputs: |
      [OUTPUT]
          Name es
          Match *
          Host elasticsearch-master.logging.svc.cluster.local
          Port 9200
          Index fluent-bit
          Type _doc
          Retry_Limit 3
          Suppress_Type_Name On
          tls On
          tls.verify Off # Disable TLS verification (for self-signed certs)

kibana:
  enabled: true
  
  # Connect to Elasticsearch
  elasticsearchHosts: "https://elasticsearch-master.logging.svc.cluster.local:9200"

  extraVolumes:
    - name: elastic-certs
      secret:
        secretName: elasticsearch-master-certs
  extraVolumeMounts:
    - name: elastic-certs
      mountPath: /usr/share/kibana/config/certs
      readOnly: true

  # Resource limits
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  
  kibanaConfig:
    kibana.yml: |
      elasticsearch.ssl.certificateAuthorities: /usr/share/kibana/config/certs/ca.crt
      elasticsearch.ssl.verificationMode: certificate
      server.ssl.enabled: false   # Kibana UI served over HTTP (Ingress handles HTTPS)
      server.basePath: "/kibana"
      server.rewriteBasePath: true

  # Ingress for web access
  ingress:
    enabled: true
    className: nginx
    paths:
      - path: /kibana
        pathType: Prefix