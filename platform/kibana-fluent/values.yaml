fluent-bit:
  enabled: true
  
  # Resource limits for each Fluent Bit pod
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  
  # Configuration
  config:
    # Where to send logs
    outputs: |
      [OUTPUT]
          Name es
          Match *
          Host logging-stack-elasticsearch.logging.svc.cluster.local
          Port 9200
          Index fluent-bit
          Type _doc
          Retry_Limit 3
          Suppress_Type_Name On
    
    # What logs to collect
    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          Parser docker
          Tag kube.*
          Mem_Buf_Limit 5MB
          Skip_Long_Lines On
    
    # Parse and enrich logs
    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Kube_URL https://kubernetes.default.svc:443
          Kube_CA_File /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
          Merge_Log On
          K8S-Logging.Parser On
          K8S-Logging.Exclude On

kibana:
  enabled: true
  
  # Connect to Elasticsearch
  elasticsearchHosts: "http://logging-stack-elasticsearch.logging.svc.cluster.local:9200"
  
  # Resource limits
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  
  kibanaConfig:
    kibana.yml: |
      server.basePath: "/kibana"
      server.rewriteBasePath: true
      elasticsearch.ssl.verificationMode: none

