fluent-bit:
  enabled: true
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  
  config:
    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          Parser docker
          Tag kube.*
          Mem_Buf_Limit 5MB
          Skip_Long_Lines On
    
    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Kube_URL https://kubernetes.default.svc:443
          Kube_CA_File /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
          Merge_Log On
          K8S-Logging.Parser On
          K8S-Logging.Exclude On
    
    # No authentication needed since security is disabled
    outputs: |
      [OUTPUT]
          Name es
          Match *
          Host elasticsearch-master.logging.svc.cluster.local
          Port 9200
          Index fluent-bit
          Type _doc
          Retry_Limit 3
          Suppress_Type_Name On

---
kibana:
  enabled: true
  
  # HTTP connection (no TLS)
  elasticsearchHosts: "http://elasticsearch-master.logging.svc.cluster.local:9200"

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  
  kibanaConfig:
    kibana.yml: |
      server.basePath: "/kibana"
      server.rewriteBasePath: true

  ingress:
    enabled: true
    className: nginx
    paths:
      - path: /kibana
        pathType: Prefix