# ============================================
# Fluent Bit Configuration
# ============================================
fluent-bit:
  enabled: true
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  
  # Environment variable for Elasticsearch password
  env:
    - name: ES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: elasticsearch-master-credentials
          key: password
  
  config:
    # Collect logs from Kubernetes containers
    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          Parser docker
          Tag kube.*
          Mem_Buf_Limit 5MB
          Skip_Long_Lines On
    
    # Enrich logs with Kubernetes metadata
    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Kube_URL https://kubernetes.default.svc:443
          Kube_CA_File /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
          Merge_Log On
          K8S-Logging.Parser On
          K8S-Logging.Exclude On
    
    # Send logs to Elasticsearch with authentication
    outputs: |
      [OUTPUT]
          Name es
          Match *
          Host elasticsearch-master.logging.svc.cluster.local
          Port 9200
          HTTP_User elastic
          HTTP_Passwd ${ES_PASSWORD}
          Index fluent-bit
          Type _doc
          Retry_Limit 3
          Suppress_Type_Name On
          tls On
          tls.verify Off

---
# ============================================
# Kibana Configuration
# ============================================
kibana:
  enabled: true
  
  # Connect to Elasticsearch with HTTPS
  elasticsearchHosts: "https://elasticsearch-master.logging.svc.cluster.local:9200"
  
  # Use credentials from Kubernetes secret
  elasticsearchCredentialSecret: elasticsearch-master-credentials
  
  # Mount Elasticsearch certificates for TLS verification
  extraVolumes:
    - name: elastic-certs
      secret:
        secretName: elasticsearch-master-certs
  
  extraVolumeMounts:
    - name: elastic-certs
      mountPath: /usr/share/kibana/config/certs
      readOnly: true
  
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  
  # Kibana configuration
  kibanaConfig:
    kibana.yml: |
      elasticsearch.ssl.certificateAuthorities: /usr/share/kibana/config/certs/ca.crt
      elasticsearch.ssl.verificationMode: certificate
      server.basePath: "/kibana"
      server.rewriteBasePath: true
  
  # Expose Kibana via Nginx Ingress
  ingress:
    enabled: true
    className: nginx
    paths:
      - path: /kibana
        pathType: Prefix