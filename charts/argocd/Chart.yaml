apiVersion: v2
name: argocd-umbrella
description: Umbrella chart for ArgoCD installation with custom configuration
type: application
version: 1.0.0
appVersion: "3.1.8"  # Current stable version of ArgoCD

dependencies:
  # Official ArgoCD Helm chart
  - name: argo-cd
    version: 8.6.0
    repository: https://argoproj.github.io/argo-helm
    condition: argo-cd.enabled
  
  # Custom configuration subchart (local subchart)
  - name: argocd-config
    version: 1.0.0
    repository: file://./argocd-config 
    condition: argocd-config.enabled