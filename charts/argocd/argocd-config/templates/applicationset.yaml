apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-and-apps
  namespace: argocd
spec:
  goTemplate: true  # ✅ CRITICAL: Enable Go templating
  generators:
    - list:
        elements:
          - name: ingress-nginx
            namespace: ingress-nginx
            chartName: ingress-nginx
            chartRepo: https://kubernetes.github.io/ingress-nginx
            chartVersion: 4.13.3
            wave: "-2"
          - name: sealed-secrets
            namespace: sealed-secrets
            chartName: sealed-secrets
            chartRepo: https://bitnami-labs.github.io/sealed-secrets
            chartVersion: 2.17.7
            wave: "-1"
          - name: flashcards
            namespace: apps
            gitRepo: https://gitlab.com/portfolio5815640/flashcards-gitops.git
            path: charts/flashcards
            wave: "0"

  template:
    metadata:
      name: "platform-{{ .name }}"  # ✅ Proper Go template
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .wave }}"  # ✅ Proper Go template
    spec:
      project: portfolio-apps
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"  # ✅ Proper Go template
      
      source:
        # ✅ Proper Go template conditional
        {{- if .chartName }}
        repoURL: "{{ .chartRepo }}"
        chart: "{{ .chartName }}"
        targetRevision: "{{ .chartVersion }}"
        helm:
          {{- if eq .name "ingress-nginx" }}
          values: |
            controller:
              extraArgs:
                enable-ssl-passthrough: "true"
          {{- end }}
        {{- else }}
        repoURL: "{{ .gitRepo }}"
        path: "{{ .path }}"
        targetRevision: "main"
        {{- end }}
      
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true