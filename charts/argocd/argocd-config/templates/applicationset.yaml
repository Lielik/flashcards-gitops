apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-and-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: ingress-nginx
            namespace: ingress-nginx
            chartName: ingress-nginx
            chartRepo: https://kubernetes.github.io/ingress-nginx
            chartVersion: 4.13.3
            wave: "-2"
          - name: sealed-secrets
            namespace: sealed-secrets
            chartName: sealed-secrets
            chartRepo: https://bitnami-labs.github.io/sealed-secrets
            chartVersion: 2.17.7
            wave: "-1"
          - name: flashcards
            namespace: apps
            gitRepo: https://gitlab.com/portfolio5815640/flashcards-gitops.git
            path: charts/flashcards
            wave: "0"

  template:
    metadata:
      # Helm must pass Argo's template through verbatim:
      name: 'platform-{{`{{ .name }}`}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{`{{ .wave }}`}}'
    spec:
      project: portfolio-apps
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{`{{ .namespace }}`}}'

      # Choose source type based on whether chartName is provided
      source:
        {{`{{- if .chartName }}`}}
        repoURL: '{{`{{ .chartRepo }}`}}'
        chart: '{{`{{ .chartName }}`}}'
        targetRevision: '{{`{{ .chartVersion }}`}}'
        helm:
          valueFiles:
            - values.yaml
          values: |
            {{`{{- if eq .name "ingress-nginx" }}`}}
            controller:
              extraArgs:
                enable-ssl-passthrough: "true"
            {{`{{- end }}`}}
            {{`{{- if eq .name "sealed-secrets" }}`}}
            # (defaults)
            {{`{{- end }}`}}
        {{`{{- else }}`}}
        repoURL: '{{`{{ .gitRepo }}`}}'
        path: '{{`{{ .path }}`}}'
        targetRevision: 'main'
        helm:
          valueFiles:
            - values.yaml
        {{`{{- end }}`}}

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
