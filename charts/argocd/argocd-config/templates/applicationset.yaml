apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-and-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: ingress-nginx
            type: helm
            repoURL: {{ .Values.applicationSet.components.ingressNginx.chartRepo | quote }}
            chart: {{ .Values.applicationSet.components.ingressNginx.chartName | quote }}
            version: {{ .Values.applicationSet.components.ingressNginx.chartVersion | quote }}
            namespace: {{ .Values.applicationSet.components.ingressNginx.namespace | quote }}
            wave: {{ .Values.applicationSet.syncWaves.ingressNginx | quote }}

          - name: sealed-secrets
            type: helm
            repoURL: {{ .Values.applicationSet.components.sealedSecrets.chartRepo | quote }}
            chart: {{ .Values.applicationSet.components.sealedSecrets.chartName | quote }}
            version: {{ .Values.applicationSet.components.sealedSecrets.chartVersion | quote }}
            namespace: {{ .Values.applicationSet.components.sealedSecrets.namespace | quote }}
            wave: {{ .Values.applicationSet.syncWaves.sealedSecrets | quote }}

          - name: flashcards
            type: git
            repoURL: {{ .Values.applicationSet.components.flashcardsApp.gitRepo | quote }}
            path: {{ .Values.applicationSet.components.flashcardsApp.path | quote }}
            namespace: {{ .Values.applicationSet.components.flashcardsApp.namespace | quote }}
            wave: {{ .Values.applicationSet.syncWaves.application | quote }}

  template:
    metadata:
      # escape so Helm outputs {{ .name }} literally
      name: {{ "{{ .name }}" }}
      annotations:
        argocd.argoproj.io/sync-wave: {{ "{{ .wave }}" }}
    spec:
      project: {{ .Values.appProject.name | quote }}
      destination:
        server: https://kubernetes.default.svc
        namespace: {{ "{{ .namespace }}" }}
      source:
        {{ "{{- if eq .type \"helm\" }}" }}
        repoURL: {{ "{{ .repoURL }}" }}
        chart: {{ "{{ .chart }}" }}
        targetRevision: {{ "{{ .version }}" }}
        helm:
          skipCrds: false
        {{ "{{- else }}" }}
        repoURL: {{ "{{ .repoURL }}" }}
        targetRevision: main
        path: {{ "{{ .path }}" }}
        {{ "{{- end }}" }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
