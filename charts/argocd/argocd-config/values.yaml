# ==========================================================
# ArgoCD Config Subchart Values
# ==========================================================
# These values can be overridden by the parent umbrella chart

# Default GitOps repository
gitopsRepo:
  url: "https://gitlab.com/portfolio5815640/flashcards-gitops.git"

# ApplicationSet configuration
applicationSet:
  syncWaves:
    ingressNginx: "-2"
    sealedSecrets: "-1"
    application: "0"
  
  components:
    ingressNginx:
      chartRepo: "https://kubernetes.github.io/ingress-nginx"
      chartName: "ingress-nginx"
      chartVersion: "4.13.3"
      namespace: "ingress-nginx"
    
    sealedSecrets:
      chartRepo: "https://bitnami-labs.github.io/sealed-secrets"
      chartName: "sealed-secrets"
      chartVersion: "2.17.7"
      namespace: "sealed-secrets"
    
    flashcardsApp:
      gitRepo: "https://gitlab.com/portfolio5815640/flashcards-gitops.git"
      path: "charts/flashcards"
      namespace: "apps"

# AppProject configuration
appProject:
  name: "portfolio-apps"
  description: "Flashcards app and dependencies"
  sourceRepos:
    - "https://gitlab.com/portfolio5815640/flashcards-gitops.git"
    - "https://argoproj.github.io/argo-helm"
    - "https://charts.bitnami.com/bitnami"
    - "https://kubernetes.github.io/ingress-nginx"
    - "https://bitnami-labs.github.io/sealed-secrets"
  destinations:
    - namespace: "argocd"
    - namespace: "apps"
    - namespace: "databases"
    - namespace: "ingress-nginx"
    - namespace: "sealed-secrets"