apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
spec:
  project: default

  # Point to the entire repository
  source:
    repoURL: https://github.com/Lielik/flashcards-gitops
    targetRevision: main
    path: . # Root directory
    directory:
      recurse: true # Find all Application manifests
      include: "{platform,apps}/*.yaml" # Only these patterns

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
