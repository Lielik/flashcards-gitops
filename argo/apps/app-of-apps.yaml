apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-root
  namespace: argocd
spec:
  project: portfolio-apps
  # single source with a base path that covers both sub-folders
  source:
    repoURL: https://gitlab.com/portfolio5815640/flashcards-gitops.git
    targetRevision: main
    path: argo # includes both apps/ ingress/ and secrets/

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
