apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-root
  namespace: argocd
spec:
  project: portfolio-apps
  source:
    repoURL: https://gitlab.com/portfolio5815640/flashcards-gitops.git
    targetRevision: main
    path: argo
    directory:                  
      recurse: true             
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
