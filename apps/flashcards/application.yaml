apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flashcards
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10" # Deploy after platform components
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Lielik/flashcards-gitops
    targetRevision: main
    path: apps/flashcards/manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

    # Sync waves for ordered deployment within the app
    syncWaves:
      - "10" # Deploy after platform (sealed-secrets, ingress)

  # Ignore differences in auto-generated fields
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/replicas
