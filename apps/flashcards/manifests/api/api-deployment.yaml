apiVersion: apps/v1
kind: Deployment
metadata:
  name: flashcards-api
  namespace: apps
  labels:
    app: flashcards
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flashcards
      component: api
  template:
    metadata:
      labels:
        app: flashcards
        component: api
    spec:
      containers:
        - name: api
          image: 515214871063.dkr.ecr.us-east-1.amazonaws.com/flashcards-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: MONGO_URI
              value: "mongodb://$(MONGODB_USERNAME):$(MONGODB_PASSWORD)@mongodb-0.mongodb:27017/$(MONGODB_DATABASE)?authSource=admin"
            - name: MONGODB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: mongodb-username
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: mongodb-password
            - name: MONGODB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: mongodb-database
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: flask-secret
                  key: secret-key
            - name: DEBUG
              value: "false"
            - name: PORT
              value: "5000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
